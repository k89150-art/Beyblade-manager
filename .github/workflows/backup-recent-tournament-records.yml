name: Backup Recent Tournament Records

on:
  workflow_dispatch:
    inputs:
      uid:
        description: Firebase Auth UID to inspect
        required: true
        default: SesDhvXG6MUT38YhqGl0N6lVgMz1
      scan_minutes:
        description: Number of recent minutes to scan (maximum 59)
        required: true
        default: "59"

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Find and preserve the newest retained tournament data
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_K89150_WEB_LOGIN }}
          TARGET_UID: ${{ inputs.uid }}
          SCAN_MINUTES: ${{ inputs.scan_minutes }}
        run: |
          python3 -m pip install --quiet google-auth requests
          python3 - <<'PY'
          import datetime
          import json
          import os
          import urllib.error
          import urllib.parse
          import urllib.request
          from google.auth.transport.requests import Request
          from google.oauth2 import service_account

          project = "k89150-web-login"
          uid = os.environ["TARGET_UID"].strip()
          scan_minutes = min(59, max(1, int(os.environ["SCAN_MINUTES"])))
          account_info = json.loads(os.environ["SERVICE_ACCOUNT_JSON"])
          credentials = service_account.Credentials.from_service_account_info(
              account_info,
              scopes=["https://www.googleapis.com/auth/datastore"],
          )
          credentials.refresh(Request())
          token = credentials.token
          base = f"https://firestore.googleapis.com/v1/projects/{project}/databases/(default)/documents"
          source_path = f"users/{uid}/appData/main"
          source_url = f"{base}/{source_path}"
          headers = {"Authorization": f"Bearer {token}"}
          now = datetime.datetime.now(datetime.timezone.utc)
          found = None

          for seconds_back in range(30, scan_minutes * 60 + 1, 30):
              read_time = (now - datetime.timedelta(seconds=seconds_back)).isoformat(
                  timespec="microseconds"
              ).replace("+00:00", "Z")
              url = source_url + "?" + urllib.parse.urlencode({"readTime": read_time})
              request = urllib.request.Request(url, headers=headers)
              try:
                  with urllib.request.urlopen(request) as response:
                      document = json.load(response)
              except urllib.error.HTTPError as error:
                  if error.code == 404:
                      continue
                  raise

              field = document.get("fields", {}).get("tournamentRecords")
              values = (field or {}).get("arrayValue", {}).get("values", [])
              if values:
                  found = (read_time, field, len(values))
                  break

          if not found:
              print(f"No retained tournament records found in the last {scan_minutes} minutes.")
              raise SystemExit(0)

          read_time, tournament_field, record_count = found
          backup_id = "tournament-" + now.strftime("%Y%m%d-%H%M%S")
          backup_url = f"{base}/users/{uid}/recovery/{backup_id}"
          body = {
              "fields": {
                  "tournamentRecords": tournament_field,
                  "recoveredFrom": {"timestampValue": read_time},
                  "recoveredAt": {
                      "timestampValue": now.isoformat(timespec="microseconds").replace("+00:00", "Z")
                  },
                  "sourceDocument": {"stringValue": source_path},
              }
          }
          request = urllib.request.Request(
              backup_url,
              data=json.dumps(body).encode("utf-8"),
              headers={**headers, "Content-Type": "application/json"},
              method="PATCH",
          )
          with urllib.request.urlopen(request) as response:
              json.load(response)

          print(f"Preserved {record_count} tournament record(s) in private backup {backup_id}.")
          print(f"Recovered source timestamp: {read_time}")
          PY
